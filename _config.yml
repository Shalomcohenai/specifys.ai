# Jekyll Configuration for Specifys.ai Blog
# GitHub Pages compatible setup

# Site settings
title: "Specifys.ai"
description: "AI-powered app planning platform - Generate specifications, discover development tools, and plan your app smarter with AI-driven insights"
url: "https://specifys-ai.com"
baseurl: ""
author: "Specifys.ai"
keywords: "AI development tools, app specification generator, no-code platform, AI-powered planning, vibe coding"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# Collections
collections:
  posts:
    output: true
    permalink: /:year/:month/:day/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Plugins (GitHub Pages compatible)
plugins:
  - jekyll-redirect-from
  # jekyll-sitemap disabled - using dynamic sitemap from backend server
  - jekyll-feed

# Exclude files from processing
exclude:
  - README.md
  - Gemfile
  - node_modules
  - backend
  - vendor
  - .sass-cache
  - .jekyll-cache
  - .jekyll-metadata
  - .gitignore
  - .git
  - .DS_Store
  - Thumbs.db
  - package.json
  - package-lock.json
  - create-post.js
  - create-post.sh
  - create-post.bat
  - config/
  - backup-*
  - assets/css/main.scss

# Include files
include:
  - _redirects
  - tools/
  - blog/  # Blog directory must be explicitly included
  # CSS files - must be explicitly listed (Jekyll doesn't support wildcards)
  - assets/css/main-compiled.css
  - assets/css/components/badges.css
  - assets/css/components/buttons.css
  - assets/css/components/mermaid.css
  - assets/css/utilities/display.css
  - assets/css/utilities/spacing.css
  - assets/css/utilities/text.css
  - assets/css/utilities/_responsive.css
  - assets/css/utilities/_flexbox.css
  - assets/css/utilities/_position.css
  - assets/css/utilities/_width.css
  - assets/css/utilities/_height.css
  - assets/css/utilities/_border.css
  - assets/css/utilities/_shadow.css
  - assets/css/utilities/_overflow.css
  - assets/css/pages/404.css
  - assets/css/pages/about.css
  - assets/css/pages/academy.css
  - assets/css/pages/admin-dashboard.css
  - assets/css/pages/article.css
  - assets/css/pages/articles.css
  - assets/css/pages/auth.css
  - assets/css/pages/blog.css
  - assets/css/pages/demo-spec.css
  - assets/css/pages/how.css
  - assets/css/pages/post.css
  - assets/css/pages/index.css
  - assets/css/pages/index-process-flow.css
  - assets/css/pages/index-why-sections.css
  - assets/css/pages/maintenance.css
  - assets/css/pages/pricing.css
  - assets/css/pages/profile.css
  - assets/css/pages/spec-viewer.css
  - assets/css/pages/spec-viewer-side-menu.css
  - assets/css/pages/toolpicker.css
  - assets/css/pages/why.css

# Sass settings
sass:
  style: compressed

# Kramdown settings
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
    span:
      line_numbers: false
    block:
      line_numbers: false

# SEO settings
lang: en
locale: en_US
timezone: America/New_York

# Social links
twitter:
  username: specifysai
linkedin:
  url: https://www.linkedin.com/company/specifys-ai/

# Google Analytics
google_analytics: G-RWBT69JCM7

