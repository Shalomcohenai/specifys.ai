<script>
  /** Firebase Auth compat instance — never rely on a bare global `auth` (not visible in all script/module orderings). */
  function getFirebaseAuthCompat() {
    if (typeof window !== 'undefined' && window.auth) return window.auth;
    if (typeof firebase !== 'undefined' && firebase.auth) return firebase.auth();
    return null;
  }

  // Auth UI functions
  function updateAuthUI(user) {
    const authButtons = document.getElementById('auth-buttons');
    if (!authButtons) return;
    
    if (user) {
      // User is logged in
      const displayName = user.displayName || user.email.split('@')[0];
      const firstLetter = displayName.charAt(0).toUpperCase();
      
      authButtons.innerHTML = `
        <a href="{{ '/pages/profile.html' | relative_url }}" class="user-info" style="text-decoration: none;">
          <div class="user-avatar">${firstLetter}</div>
          <span>${displayName}</span>
        </a>
      `;
    } else {
      // User is not logged in
      authButtons.innerHTML = `
        <button class="auth-btn" onclick="showLoginModal()">Log in/Sign up</button>
      `;
    }
  }

  // Global auth functions
  window.showLoginModal = function() {
    if (typeof trackButtonClick !== 'undefined') {
      trackButtonClick('Show Login', 'Authentication', 'header');
    }
    window.location.href = '{{ "/pages/auth.html" | relative_url }}';
  };

  window.showRegisterModal = function() {
    if (typeof trackButtonClick !== 'undefined') {
      trackButtonClick('Show Register', 'Authentication', 'header');
    }
    window.location.href = '{{ "/pages/auth.html" | relative_url }}';
  };

  window.logout = function() {
    if (typeof trackAuthEvent !== 'undefined') {
      trackAuthEvent('logout', 'email');
    }
    
    const authInstance = getFirebaseAuthCompat();
    
    if (!authInstance) {
      // Redirect to auth page as fallback
      window.location.href = '{{ "/pages/auth.html" | relative_url }}';
      return;
    }
    
    authInstance.signOut()
      .then(() => {
        // Logged out successfully
        window.location.reload();
      })
      .catch(error => {
        // Still redirect to auth page even if signOut fails
        window.location.href = '{{ "/pages/auth.html" | relative_url }}';
      });
  };

  // Listen to auth state changes (only after Firebase is initialized)
  function setupAuthListener() {
    const authInstance = getFirebaseAuthCompat();
    
    if (!authInstance) {
      setTimeout(setupAuthListener, 100);
      return;
    }
    
    authInstance.onAuthStateChanged(async (user) => {
      updateAuthUI(user);

      // Ensure user document exists immediately for new users; expose promise for credits loading
      if (user) {
        if (document.visibilityState === 'visible') {
          window.__userInitPromise = ensureUserDocument(user).catch(function() {
            // Error ensuring user document - credits flow will still try one GET
          });
        } else {
          window.__userInitPromise = Promise.resolve();
        }
      } else {
        window.__userInitPromise = undefined;
      }
    });
  }
  
  async function ensureUserDocument(user, retryCount = 0) {
    const MAX_RETRIES = 3;
    const RETRY_DELAYS = [500, 1000, 2000]; // ms
    
    try {
      // Verify user is still authenticated before making the request
      if (!user) {
        return; // User logged out, skip initialization
      }
      
      const token = await user.getIdToken();
      const apiBaseUrl = window.getApiBaseUrl ? window.getApiBaseUrl() : (window.API_BASE_URL || window.BACKEND_URL || '');
      
      // Check if user is new based on sessionStorage flag (set in auth.html during registration)
      // This helps the server correctly identify new users even if documents were created by race condition
      const showCreditPopup = sessionStorage.getItem('showCreditPopup') === 'true';
      const isNewUser = showCreditPopup; // If showCreditPopup is set, user is likely new
      
      // Use AbortController to handle errors more gracefully
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 2500); // 2.5 second timeout (reduced from 5s for faster loading)
      
      let response;
      try {
        response = await fetch(`${apiBaseUrl}/api/users/initialize`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            isNewUser: isNewUser || undefined // Only send if true, let server determine otherwise
          }),
          signal: controller.signal
        });
      } catch (fetchError) {
        clearTimeout(timeoutId);
        // Handle network errors gracefully - don't block user from using the site
        if (fetchError.name === 'AbortError' || 
            fetchError.message.includes('Failed to fetch') || 
            fetchError.message.includes('NetworkError') ||
            fetchError.message.includes('Load failed')) {
          // Silently fail - endpoint might not be available or network issue
          // User can still use the site, credits will be initialized on next page load or when API is available
          return;
        }
        // For other errors, silently fail (don't block user)
        return;
      }
      
      clearTimeout(timeoutId);

      if (response.ok) {
        const result = await response.json();
        
        // Don't rely on server response for isNewUser - it may be incorrect if documents already exist
        // Instead, only set the flag if it's not already set (to avoid overwriting flags set in auth.html)
        // The flag should be set in auth.html using getAdditionalUserInfo or for registration
        const existingFlag = sessionStorage.getItem('showCreditPopup');
        if (!existingFlag && result && result.isNewUser) {
          sessionStorage.setItem('showCreditPopup', 'true');
          
          // Note: checkForCreditPopup will be called from index.js after credit initialization
          // No need to call it here to avoid duplicate calls
        } else if (existingFlag) {
          // נקה cache
          if (typeof window.clearCreditsCache === 'function') {
            window.clearCreditsCache();
          }
          // עדכן תצוגה עם forceRefresh
          if (typeof window.updateCreditsDisplay === 'function') {
            window.updateCreditsDisplay({ forceRefresh: true });
          }
        }
        
        // If entitlements were created or updated, trigger credits refresh
        if (result.entitlements && (result.created || result.updated)) {
          // Clear credits cache (credits-v3)
          if (typeof window.clearCreditsCache === 'function') {
            window.clearCreditsCache();
          }
          
          // Update credits display (no force refresh, will use cache if available)
          if (typeof window.updateCreditsDisplay === 'function') {
            window.updateCreditsDisplay({ forceRefresh: false });
          }
        }
      } else if (response.status === 404) {
        // Endpoint doesn't exist - silently fail (might be development or endpoint not deployed)
        // Don't retry on 404 - it won't help
        // Don't log to console to avoid noise
        return;
      } else {
        // Only throw for non-404 errors
        const errorText = await response.text().catch(() => '');
        throw new Error(`HTTP ${response.status}${errorText ? ': ' + errorText.substring(0, 100) : ''}`);
      }
    } catch (error) {
      // Don't retry on network errors that suggest the endpoint doesn't exist
      // Don't log 404 errors to console to avoid noise
      const errorMessage = error.message || error.toString() || '';
      if (errorMessage.includes('404') || 
          errorMessage.includes('Failed to fetch') || 
          errorMessage.includes('Not Found') ||
          errorMessage.includes('NetworkError') ||
          errorMessage.includes('Load failed') ||
          error.name === 'AbortError') {
        // Silently fail - endpoint might not be available
        return;
      }
      
      // Retry on other failures
      if (retryCount < MAX_RETRIES) {
        const delay = RETRY_DELAYS[retryCount] || 2000;
        await new Promise(resolve => setTimeout(resolve, delay));
        return ensureUserDocument(user, retryCount + 1);
      }
      // Only log warning if it's not a 404 or network error
      if (!errorMessage.includes('404') && 
          !errorMessage.includes('Failed to fetch') &&
          !errorMessage.includes('NetworkError') &&
          !errorMessage.includes('Load failed') &&
          error.name !== 'AbortError') {
        // Error initializing user documents after retries
      }
    }
  }

  // Wait for Firebase to be ready
  if (typeof firebase !== 'undefined' && firebase.auth) {
    // Firebase already loaded, wait a bit for initialization
    setTimeout(setupAuthListener, 100);
  } else {
    window.addEventListener('firebase-ready', setupAuthListener);
  }

  // Initialize auth buttons with default state (only if auth listener hasn't run yet)
  document.addEventListener('DOMContentLoaded', function() {
    const authButtons = document.getElementById('auth-buttons');
    if (!authButtons) return;
    
    const authInstance = getFirebaseAuthCompat();
    if (authInstance) {
      // Auth is available, set up a one-time listener to check current state
      // This ensures we get the auth state even if it's still loading
      const unsubscribe = authInstance.onAuthStateChanged((user) => {
        // Update UI with current auth state
        updateAuthUI(user);
        // Unsubscribe after first check
        unsubscribe();
      });
      return;
    }
    
    // Only set default if buttons are empty and we don't have auth yet
    if (!authButtons.innerHTML.trim()) {
      authButtons.innerHTML = `
        <button class="auth-btn login-btn">Log in/Sign up</button>
      `;
      
      const loginBtn = authButtons.querySelector('.login-btn');
      if (loginBtn) {
        loginBtn.addEventListener('click', function(event) {
          event.stopPropagation();
          window.location.href = '{{ "/pages/auth.html" | relative_url }}';
        });
      }
    }
  });
</script>
