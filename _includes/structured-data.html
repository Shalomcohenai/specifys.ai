<!-- Structured Data (JSON-LD) for SEO -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "Organization",
      "name": "Specifys.ai",
      "url": "https://specifys-ai.com",
      "logo": "https://specifys-ai.com/favicon.ico",
      "description": "AI-powered app planning and specification generation platform",
      "sameAs": [
        "https://www.linkedin.com/company/specifys-ai/"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "specifysai@gmail.com",
        "contactType": "Customer Service"
      }
    },
    {
      "@type": "WebSite",
      "name": "Specifys.ai",
      "url": "https://specifys-ai.com",
      "description": "Plan your app smarter with AI-driven insights and tools",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://specifys-ai.com/pages/ToolPicker.html?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    },
    {
      "@type": "SoftwareApplication",
      "name": "Specifys.ai",
      "applicationCategory": "DevelopmentApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "250"
      },
      "description": "AI-powered app planning platform with specification generator, market research tools, and vibe coding tools map"
    }{% if page.url == '/' or page.url == '/index.html' %},
    {
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What's Specifys.ai all about?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Specifys.ai is a complete AI-powered app planning ecosystem. Create specs, discover tools, manage projects—all free."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need to create an account?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Creating an account is optional but recommended! It allows you to save your specs and manage projects."
          }
        },
        {
          "@type": "Question",
          "name": "Is it really 100% free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! All features are completely free. No hidden fees, no premium tiers."
          }
        },
        {
          "@type": "Question",
          "name": "What is the Vibe Coding Tools Map?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Our curated collection of AI-driven development tools, organized by category."
          }
        },
        {
          "@type": "Question",
          "name": "How does the Tool Finder work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Our AI analyzes your project needs and suggests the most suitable tools."
          }
        }
      ]
    }{% endif %}{% if page.layout == 'post' %},
    {
      "@type": "Article",
      "headline": "{{ page.title }}",
      "description": "{{ page.description | default: page.excerpt | strip_html | truncate: 160 }}",
      "author": {
        "@type": "Organization",
        "name": "Specifys.ai"
      },
      "publisher": {
        "@type": "Organization",
        "name": "Specifys.ai",
        "logo": {
          "@type": "ImageObject",
          "url": "https://specifys-ai.com/favicon.ico"
        }
      },
      "datePublished": "{{ page.date | date_to_xmlschema }}",
      "dateModified": "{{ page.date | date_to_xmlschema }}",
      "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": "{{ page.url | absolute_url }}"
      }
    }{% endif %}{% unless page.url == '/' or page.url == '/index.html' %},
    {
      "@type": "BreadcrumbList",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "{{ site.url | default: 'https://specifys-ai.com' }}/"
        }{% if page.url contains '/pages/' %},
        {
          "@type": "ListItem",
          "position": 2,
          "name": "{{ page.title | default: 'Page' }}",
          "item": "{{ page.url | absolute_url }}"
        }{% elsif page.url contains '/blog/' or page.url contains '/academy/' %},
        {
          "@type": "ListItem",
          "position": 2,
          "name": "{{ page.title | default: 'Page' }}",
          "item": "{{ page.url | absolute_url }}"
        }{% endif %}
      ]
    }{% endunless %}{% if page.url == '/pages/pricing.html' %},
    {
      "@type": "Product",
      "name": "Specifys.ai Plans",
      "description": "Choose from Single Spec, 3-Pack, or Pro subscription plans for app specification generation",
      "offers": [
        {
          "@type": "Offer",
          "name": "Single Spec",
          "price": "4.90",
          "priceCurrency": "USD",
          "availability": "https://schema.org/InStock",
          "url": "https://specifys-ai.com/pages/pricing.html"
        },
        {
          "@type": "Offer",
          "name": "3-Pack",
          "price": "9.90",
          "priceCurrency": "USD",
          "availability": "https://schema.org/InStock",
          "url": "https://specifys-ai.com/pages/pricing.html"
        },
        {
          "@type": "Offer",
          "name": "Pro Monthly",
          "price": "29.90",
          "priceCurrency": "USD",
          "priceSpecification": {
            "@type": "UnitPriceSpecification",
            "price": "29.90",
            "priceCurrency": "USD",
            "billingIncrement": "P1M"
          },
          "availability": "https://schema.org/InStock",
          "url": "https://specifys-ai.com/pages/pricing.html"
        },
        {
          "@type": "Offer",
          "name": "Pro Yearly",
          "price": "299.90",
          "priceCurrency": "USD",
          "priceSpecification": {
            "@type": "UnitPriceSpecification",
            "price": "299.90",
            "priceCurrency": "USD",
            "billingIncrement": "P1Y"
          },
          "availability": "https://schema.org/InStock",
          "url": "https://specifys-ai.com/pages/pricing.html"
        }
      ]
    }{% endif %}{% if page.url == '/pages/how.html' %},
    {
      "@type": "HowTo",
      "name": "How Specifys.ai Works",
      "description": "Learn how to use Specifys.ai to transform your app idea into a complete specification",
      "step": [
        {
          "@type": "HowToStep",
          "name": "Fill the Brief",
          "text": "Capture your product goals, target users, and must-have features through a focused questionnaire."
        },
        {
          "@type": "HowToStep",
          "name": "Approve the Overview",
          "text": "Review and approve the generated overview of your application."
        },
        {
          "@type": "HowToStep",
          "name": "Generate Full Specification",
          "text": "Generate a complete specification document with technical details, market research, and design guidelines."
        }
      ]
    }{% endif %}{% if page.url == '/pages/about.html' %},
    {
      "@type": "AboutPage",
      "name": "About Specifys.ai",
      "description": "Learn about Specifys.ai, our mission, and the story behind our AI-driven app specification platform",
      "mainEntity": {
        "@type": "Organization",
        "name": "Specifys.ai",
        "founder": {
          "@type": "Person",
          "name": "Specifys.ai Team"
        },
        "description": "AI-powered app planning and specification generation platform built to help creators and developers start smarter, not faster."
      }
    }{% endif %}
  ]
}
</script>
