<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
  // Firebase Configuration
  const firebaseConfig = {
    apiKey: "AIzaSyB9hr0IWM4EREzkKDxBxYoYinV6LJXWXV4",
    authDomain: "specify-ai.firebaseapp.com",
    projectId: "specify-ai",
    storageBucket: "specify-ai.firebasestorage.app",
    messagingSenderId: "734278787482",
    appId: "1:734278787482:web:0e312fb6f197e849695a23",
    measurementId: "G-4YR9LK63MR"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  
  // Delay Firestore initialization to prevent IndexedDB blocking main thread
  // Firestore will be initialized on-demand when needed (lazy loading)
  // This improves initial page load performance by avoiding IndexedDB creation during startup
  let dbInitialized = false;
  let dbInstance = null;
  
  const getFirestore = function() {
    if (!dbInitialized) {
      dbInitialized = true;
      
      // Defer Firestore initialization until after page is interactive
      // This prevents IndexedDB from blocking the main thread during initial page load
      // Initialize immediately but defer the actual IndexedDB creation
      dbInstance = firebase.firestore();
      window.db = dbInstance;
      
      // Note: firebase.firestore() creates IndexedDB synchronously in compat mode
      // However, by using lazy loading (only initializing when window.db is accessed),
      // we ensure it's not created during initial page load unless actually needed
      // The actual IndexedDB operations happen asynchronously in the background
      
      return dbInstance;
    }
    return dbInstance || window.db;
  };
  
  // Make auth available globally immediately (needed for auth checks)
  window.auth = auth;
  
  // Make db a getter that initializes on first access (lazy loading)
  // This prevents IndexedDB from being created during initial page load
  Object.defineProperty(window, 'db', {
    get: getFirestore,
    configurable: true,
    enumerable: true
  });
  
  // Dispatch firebase-ready event for other scripts
  window.dispatchEvent(new Event('firebase-ready'));
</script>
