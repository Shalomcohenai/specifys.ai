<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Under Maintenance - Specifys.ai</title>
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- CSS - Unified compiled CSS file -->
    <link rel="stylesheet" href="/assets/css/main-compiled.css">
    <!-- Tailwind CSS - Processed via PostCSS -->
    <link rel="stylesheet" href="/assets/css/tailwind-base-compiled.css">
    <!-- Maintenance Page Specific Styles -->
    <link rel="stylesheet" href="/assets/css/pages/maintenance.css">
</head>
<body>
    <div class="maintenance-container">
        <div class="logo">Specifys<span class="logo-dot">.</span>AI</div>
        <div class="maintenance-icon">
            <i class="fas fa-tools"></i>
        </div>
        <h1>Site Under Maintenance</h1>
        <p>
            We're currently updating our systems to bring you an even better experience. 
            We'll be back shortly!
        </p>
        
        <div class="status-list">
            <div class="status-item">
                <i class="fas fa-server"></i>
                <span>Backend infrastructure being upgraded</span>
            </div>
            <div class="status-item">
                <i class="fas fa-credit-card"></i>
                <span>Payment system testing in progress</span>
            </div>
            <div class="status-item">
                <i class="fas fa-rocket"></i>
                <span>Performance optimizations being applied</span>
            </div>
        </div>
        
        <p class="maintenance-estimate">
            Estimated time: 30-60 minutes
        </p>
    </div>
</body>
</html>
