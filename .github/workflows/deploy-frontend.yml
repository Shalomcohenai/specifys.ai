name: Deploy Frontend

on:
  push:
    branches: [ main ]
    paths:
      - 'assets/**'
      - 'pages/**'
      - '_includes/**'
      - '_layouts/**'
      - '_config.yml'
      - 'vercel.json'
      - 'package.json'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  deploy:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install dependencies
        run: npm ci

      - name: Install Jekyll dependencies
        run: bundle install

      - name: Build site for Vercel
        run: npm run build:vercel

      - name: Verify build output
        run: |
          test -d _site
          test -f _site/index.html
          test -f _site/_redirects
          echo "Build output ready for Vercel (_site/)"
          ls -la _site/ | head -20


